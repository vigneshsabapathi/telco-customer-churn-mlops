name: test_code

on:
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual runs from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch raw dataset
        # The CSV is DVC-tracked locally; CI has no DVC remote configured yet,
        # so re-download from the IBM mirror. See Phase 2 Obsidian note.
        run: |
          mkdir -p data/raw
          curl -sL -o data/raw/Telco-Customer-Churn.csv \
            https://raw.githubusercontent.com/IBM/telco-customer-churn-on-icp4d/master/data/Telco-Customer-Churn.csv
          wc -l data/raw/Telco-Customer-Churn.csv

      - name: Run process stage
        run: python -m training.src.process

      - name: Run train stage (max_evals=20 — Hydra default)
        run: python -m training.src.train_model

      - name: Run training tests
        run: pytest training/tests -v

      - name: Save model to BentoML store
        run: python application/src/save_model_to_bentoml.py

      - name: Start BentoML service in background
        run: |
          bentoml serve application.src.create_service:service --port 3000 \
            > bentoml.log 2>&1 &
          echo $! > bentoml.pid
          # Poll /healthz for up to 60s
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/healthz > /dev/null; then
              echo "service ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "service failed to start within 60s"
          tail -50 bentoml.log
          exit 1

      - name: Run application tests (endpoint tests target localhost:3000)
        run: pytest application/tests -v
        env:
          CHURN_API_BASE: http://localhost:3000

      - name: Stop BentoML service
        if: always()
        run: |
          if [ -f bentoml.pid ]; then
            kill "$(cat bentoml.pid)" 2>/dev/null || true
          fi

      - name: Upload bentoml log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bentoml-log
          path: bentoml.log
