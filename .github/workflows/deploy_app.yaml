name: deploy_app

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: churn-service
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch raw dataset
        run: |
          mkdir -p data/raw
          # -f fails the step on HTTP errors instead of writing an HTML
          # error page into the CSV (same rationale as test_code.yaml).
          curl -fsSL -o data/raw/Telco-Customer-Churn.csv \
            https://raw.githubusercontent.com/IBM/telco-customer-churn-on-icp4d/master/data/Telco-Customer-Churn.csv

      - name: Train model (max_evals=100 — production hyperopt budget)
        # The repo default is max_evals=20 for fast local iteration. Deploy
        # runs the full TPE budget so the surrogate actually kicks in (TPE
        # uses n_startup_jobs=20 of uniform random sampling before the
        # surrogate is consulted, so <=20 evals is essentially random search).
        run: |
          python -m training.src.process
          python -m training.src.train_model model.max_evals=100

      - name: Evaluate model (production gate)
        # Fail the deploy if ROC-AUC drops below the documented 0.78 floor.
        # This is the only baseline gate between training and shipping.
        run: |
          python -m training.src.evaluate_model
          python - <<'PY'
          import sys
          import pandas as pd
          df = pd.read_csv("metrics.csv").set_index("metric")["value"]
          auc = float(df["roc_auc"])
          print(f"deploy gate: roc_auc={auc:.4f}")
          if auc < 0.78:
              sys.exit(f"ROC-AUC {auc:.4f} below production floor 0.78 — refusing to ship")
          PY

      - name: Save model to BentoML store
        run: python application/src/save_model_to_bentoml.py

      - name: Build Bento
        run: bentoml build

      - name: Containerize Bento (direct docker build)
        # bentoml 1.2.19's `containerize` CLI hits NotImplementedError in
        # _internal/container/base.py:42 (construct_args) regardless of flags.
        # Every Bento ships with a generated Dockerfile at
        # <bento_path>/env/docker/Dockerfile — build it directly to dodge the
        # broken wrapper. Same artifact, no version bump needed.
        id: containerize
        run: |
          BENTO_PATH=$(bentoml get churn_service:latest --output path)
          BENTO_TAG=$(bentoml get churn_service:latest --output tag)
          echo "bento_path=${BENTO_PATH}"
          echo "bento_tag=${BENTO_TAG}"
          test -f "${BENTO_PATH}/env/docker/Dockerfile" || {
            echo "no Dockerfile at ${BENTO_PATH}/env/docker/Dockerfile" >&2
            ls -la "${BENTO_PATH}/env/docker/" >&2 || true
            exit 1
          }
          docker build \
            -t "${BENTO_TAG}" \
            -f "${BENTO_PATH}/env/docker/Dockerfile" \
            "${BENTO_PATH}"
          echo "bento_tag=${BENTO_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_NAME }}"
          BENTO_TAG="${{ steps.containerize.outputs.bento_tag }}"
          docker tag "${BENTO_TAG}" "${IMAGE_BASE}:${{ github.sha }}"
          docker tag "${BENTO_TAG}" "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:${{ github.sha }}"
          docker push "${IMAGE_BASE}:latest"
          echo "Pushed ${IMAGE_BASE}:{${{ github.sha }},latest}"
