defaults:
  - process: with_contract
  - model: xgb_default
  - _self_

raw:
  path: data/raw/Telco-Customer-Churn.csv

processed:
  dir: data/processed
  X_train:
    name: X_train.csv
    path: ${processed.dir}/${processed.X_train.name}
  X_test:
    name: X_test.csv
    path: ${processed.dir}/${processed.X_test.name}
  y_train:
    name: y_train.csv
    path: ${processed.dir}/${processed.y_train.name}
  y_test:
    name: y_test.csv
    path: ${processed.dir}/${processed.y_test.name}

final:
  dir: data/final
  name: final.csv
  path: ${final.dir}/${final.name}

model:
  dir: models
  name: xgboost
  path: ${model.dir}/${model.name}

# Path where evaluate_model.py writes the (metric, value) CSV. Tests can
# override via `+metrics_path=...` to redirect into tmp dirs.
metrics_path: metrics.csv

split:
  test_size: 0.2
  random_state: 42
  stratify: true

tracking:
  experiment_name: telco-churn
  remote: false
  remote_uri: ""
  # Credentials, when remote=true, must come from environment:
  #   MLFLOW_TRACKING_USERNAME
  #   MLFLOW_TRACKING_PASSWORD
