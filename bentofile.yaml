service: "application.src.create_service:service"

labels:
  owner: vigneshsabapathi
  project: telco-customer-churn-mlops

include:
  - "application/src/**/*.py"
  - "training/src/process.py"
  - "training/src/__init__.py"
  - "training/__init__.py"
  - "application/__init__.py"
  - "application/src/__init__.py"
  - "config/**/*.yaml"

exclude:
  - "**/__pycache__/**"
  - "**/.pytest_cache/**"
  # Anchored to project test dirs (was 'tests/**' which would also drop a
  # future nested 'application/src/utils/tests/' if anyone added one).
  - "application/tests/**"
  - "training/tests/**"
  # These two ship with the runtime image but aren't entry points and
  # carry dependencies (streamlit, hydra-job-runner) we deliberately leave
  # out of python.packages — keep them out of the bento so a stray import
  # inside the container doesn't ImportError at runtime.
  - "application/src/create_app.py"
  - "application/src/save_model_to_bentoml.py"

python:
  # Mirror the runtime subset of requirements.txt — keep the image lean.
  packages:
    - "setuptools<81"
    - "pathspec>=0.10,<0.13"
    - "hydra-core==1.3.2"
    - "joblib==1.4.0"
    - "numpy==1.26.4"
    - "pandas==2.2.2"
    - "patsy==0.5.6"
    - "scikit-learn>=1.4.2,<1.7.0"
    - "xgboost==2.0.3"
    - "pydantic==2.7.4"
    - "bentoml==1.2.19"

docker:
  python_version: "3.10"
